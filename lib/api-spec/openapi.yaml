openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: CNC Machine Tools & Services API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: machines
    description: CNC Machine operations
  - name: tools
    description: Machine tool operations
  - name: services
    description: Service operations
  - name: gallery
    description: Gallery operations
  - name: contact
    description: Contact form
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /machines:
    get:
      operationId: listMachines
      tags: [machines]
      summary: List all CNC machines
      responses:
        "200":
          description: List of machines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Machine"
    post:
      operationId: createMachine
      tags: [machines]
      summary: Create a new CNC machine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMachine"
      responses:
        "201":
          description: Created machine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Machine"

  /machines/{id}:
    get:
      operationId: getMachine
      tags: [machines]
      summary: Get a CNC machine by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Machine details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Machine"
        "404":
          description: Not found
    delete:
      operationId: deleteMachine
      tags: [machines]
      summary: Delete a CNC machine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tools:
    get:
      operationId: listTools
      tags: [tools]
      summary: List all machine tools
      responses:
        "200":
          description: List of tools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tool"
    post:
      operationId: createTool
      tags: [tools]
      summary: Create a new machine tool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTool"
      responses:
        "201":
          description: Created tool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tool"

  /tools/{id}:
    delete:
      operationId: deleteTool
      tags: [tools]
      summary: Delete a machine tool
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List all services
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      summary: Create a service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateService"
      responses:
        "201":
          description: Created service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /gallery:
    get:
      operationId: listGallery
      tags: [gallery]
      summary: List gallery images
      responses:
        "200":
          description: Gallery images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryImage"
    post:
      operationId: createGalleryImage
      tags: [gallery]
      summary: Add gallery image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGalleryImage"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryImage"

  /gallery/{id}:
    delete:
      operationId: deleteGalleryImage
      tags: [gallery]
      summary: Delete gallery image
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /upload:
    post:
      operationId: uploadImage
      tags: [gallery]
      summary: Upload image to storage
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                bucket:
                  type: string
              required:
                - file
                - bucket
      responses:
        "200":
          description: Image uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                  path:
                    type: string

  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactForm"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSubmission"
    get:
      operationId: listContacts
      tags: [contact]
      summary: List all contact submissions (admin)
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactSubmission"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Machine:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        specifications:
          type: string
        imageUrl:
          type: string
          nullable: true
        category:
          type: string
        featured:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - name
        - specifications
        - category
        - featured
        - createdAt

    CreateMachine:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        specifications:
          type: string
        imageUrl:
          type: string
          nullable: true
        category:
          type: string
        featured:
          type: boolean
      required:
        - name
        - specifications
        - category
        - featured

    Tool:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        imageUrl:
          type: string
          nullable: true
        category:
          type: string
        specifications:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - description
        - category
        - specifications
        - createdAt

    CreateTool:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        imageUrl:
          type: string
          nullable: true
        category:
          type: string
        specifications:
          type: string
      required:
        - name
        - description
        - category
        - specifications

    Service:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        icon:
          type: string
        details:
          type: string
        imageUrl:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - title
        - description
        - icon
        - details
        - createdAt

    CreateService:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        icon:
          type: string
        details:
          type: string
        imageUrl:
          type: string
          nullable: true
      required:
        - title
        - description
        - icon
        - details

    GalleryImage:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        imageUrl:
          type: string
          nullable: true
        category:
          type: string
        videoUrl:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - title
        - category
        - createdAt

    CreateGalleryImage:
      type: object
      properties:
        title:
          type: string
        imageUrl:
          type: string
          nullable: true
        category:
          type: string
        videoUrl:
          type: string
          nullable: true
      required:
        - title
        - category

    ContactForm:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        message:
          type: string
      required:
        - name
        - phone
        - email
        - message

    ContactSubmission:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        message:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - phone
        - email
        - message
        - createdAt
