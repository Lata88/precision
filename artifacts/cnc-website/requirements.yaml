packages:
  "framer-motion": "For smooth page transitions, reveals, and scroll animations"
  "embla-carousel-react": "For the hero image slider"
  "embla-carousel-autoplay": "For auto-scrolling hero slider"
  "react-hook-form": "For form state management in contact and admin pages"
  "@hookform/resolvers": "For Zod form validation"
  "zod": "For schema validation"
  "clsx": "For class merging utility"
  "tailwind-merge": "For class merging utility"

images:
