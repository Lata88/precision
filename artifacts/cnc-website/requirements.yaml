  - path: "artifacts/cnc-website/public/images/hero-2.png"
    description: "Close up of a precision machine tool spindle in a dark industrial workshop, dark steel and amber cinematic lighting"
    aspect_ratio: "16:9"
  - path: "artifacts/cnc-website/public/images/hero-3.png"
    description: "Modern clean manufacturing facility floor with row of high tech CNC machines, dark navy and steel tones"
    aspect_ratio: "16:9"
  - path: "artifacts/cnc-website/public/images/workshop.png"
    description: "Engineers inspecting a complex metal part in a dimly lit high-tech industrial workshop, glowing monitors"
